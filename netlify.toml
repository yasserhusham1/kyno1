# KYNO — Netlify production (static SPA)
# publish = dist فقط (~50 ملف) — أسرع من رفع المشروع كاملاً (180+ ملف)
[build]
  command = "node tools/build-netlify.js"
  publish = "dist"

# بدون Node: powershell -NoProfile -ExecutionPolicy Bypass -File tools/build-netlify.ps1

# SPA ثابت — لا حاجة لتحسين الأصول (يوفر دقائق Post-processing)
[build.processing]
  skip_processing = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), camera=(), microphone=(), payment=()"
    X-XSS-Protection = "0"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://browser.sentry-cdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.ipify.org https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://browser.sentry-cdn.com https://*.ingest.sentry.io https://*.sentry.io; frame-src 'self' https://www.openstreetmap.org https://*.openstreetmap.org; object-src 'none'; base-uri 'self';"
